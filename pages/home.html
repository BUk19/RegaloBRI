<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブリザ 💜</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/home.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>
    <div class="home-container">
        <div class="galaxy-bg"></div>
        <div class="stars-bg"></div>
        <div class="audio-overlay" id="audioOverlay"></div>

        <div class="main-text" id="japaneseText">ブリザ</div>

        <div class="audio-panels">
            <div class="audio-panel" data-audio="1">
                <img src="../assets/imagenes/rauw.gif" class="panel-img">
                <div class="panel-label">RAUW</div>
            </div>
            <div class="audio-panel" data-audio="2">
                <img src="../assets/imagenes/human.gif" class="panel-img">
                <div class="panel-label">STRANGEHUMAN</div>
            </div>
            <div class="audio-panel" data-audio="3">
                <img src="../assets/imagenes/joji.gif" class="panel-img">
                <div class="panel-label">JOJI</div>
            </div>
            <div class="audio-panel" data-audio="4">
                <img src="../assets/imagenes/justin.gif" class="panel-img">
                <div class="panel-label">JUSTIN BIEBER</div>
            </div>

            <div class="audio-panel" data-audio="5">
                <img src="../assets/imagenes/theweekend.gif" class="panel-img">
                <div class="panel-label">THE WEEKEND</div>
            </div>
        </div>

        <div class="final-button">
            <button id="goFinal">→ Final ←</button>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/audio.js"></script>
    <script src="../js/animations.js"></script>

</body>

</html>
